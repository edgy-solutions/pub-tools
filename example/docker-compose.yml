version: '3.8'

services:
  dagster:
    image: ghcr.io/edgy-solutions/pub-tools:latest
    command: >
      /bin/sh -c "
      uv pip install --python /app/venv dagster-webserver &&
      dagster dev -h 0.0.0.0 -p 3000
      "
    ports:
      - "3000:3000"
    environment:
      - PUBLOG_S3_BUCKET_URL=s3://publog-lake
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_ENDPOINT_URL=http://minio:9000
      # Required for dlt S3 filesystem destination
      - DESTINATION__FILESYSTEM__CREDENTIALS__AWS_ACCESS_KEY_ID=minioadmin
      - DESTINATION__FILESYSTEM__CREDENTIALS__AWS_SECRET_ACCESS_KEY=minioadmin
      - DESTINATION__FILESYSTEM__CREDENTIALS__ENDPOINT_URL=http://minio:9000
    volumes:
      - ../pub_tools:/app/pub_tools
    depends_on:
      minio-setup:
        condition: service_completed_successfully

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-setup:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/publog-lake || true;
      "

volumes:
  minio_data:
